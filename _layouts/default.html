<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
      {% if page.title %} {{ page.title }} {% else %} {{ site.title }} {% endif
      %}
    </title>

    <meta
      name="description"
      content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
    />

    <link
      rel="canonical"
      href="{% if page.url == '/' %}{{ site.url }}/{% else %}{{ site.url }}{{ page.url }}{% endif %}"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}"
    />
    <meta
      property="og:description"
      content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
    />
    <meta
      property="og:url"
      content="{% if page.url == '/' %}{{ site.url }}/{% else %}{{ site.url }}{{ page.url }}{% endif %}"
    />
    <meta
      property="og:image"
      content="{% if page.og_image %}{{ page.og_image }}{% else %}{{ site.url }}/assets/images/phantom-hero.png{% endif %}"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kaido_recovery" />
    <meta
      name="twitter:title"
      content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}"
    />
    <meta
      name="twitter:description"
      content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
    />
    <meta
      name="twitter:image"
      content="{% if page.og_image %}{{ page.og_image }}{% else %}{{ site.url }}/assets/images/phantom-hero.png{% endif %}"
    />

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{{ '/assets/images/favicon/apple-touch-icon.png' | relative_url }}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{ '/assets/images/favicon/favicon-32x32.png' | relative_url }}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="{{ '/assets/images/favicon/favicon-16x16.png' | relative_url }}"
    />
    <link
      rel="manifest"
      href="{{ '/assets/images/favicon/site.webmanifest' | relative_url }}"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Main Styles -->
    <link
      rel="stylesheet"
      href="{{ '/assets/css/custom-style.css' | relative_url }}"
    />

    <!-- Output Styles | Tailwindcss -->
    <link
      rel="stylesheet"
      href="{{ '/assets/css/output.css' | relative_url }}"
    />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "{{ site.title }}",
        "url": "{{ site.url }}",
        "logo": "{{ site.url }}/assets/images/logo-2.png",
        "description": "{{ site.description }}",
        "sameAs": ["https://instagram.com/kaido.recovery"],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Support",
          "email": "info@kaido.recovery"
        }
      }
    </script>
    <!-- Meta Pixel Code -->
    <script>
      fbq('init', '2197525264025521');
      fbq('track', 'PageView');
    </script>
  </head>

  <body>
    <a href="#main" class="skip-to-main">Skip to main content</a>
    {% include site-header.html %}
    <main id="main">{{ content }}</main>
    {% include site-footer.html %}

    <script>
      (function () {
        const header = document.querySelector("[data-site-header]");

        if (!header) return;

        const updateHeaderState = () => {
          header.classList.toggle("is-scrolled", window.scrollY > 0);
        };

        updateHeaderState();
        window.addEventListener("scroll", updateHeaderState, { passive: true });
      })();
    </script>
    <script>
      // Register the service worker for caching and offline support
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register('{{ "/sw.js" | relative_url }}', {
              updateViaCache: "none",
            })
            .then(function (registration) {
              // Registration successful
              console.log(
                "ServiceWorker registration successful with scope: ",
                registration.scope,
              );
            })
            .catch(function (err) {
              console.warn("ServiceWorker registration failed: ", err);
            });
        });
      }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </body>
</html>
