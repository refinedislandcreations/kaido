<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
      {% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}
    </title>

    <meta
      name="description"
      content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
    />

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{{ '/assets/images/favicon/apple-touch-icon.png' | relative_url }}"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{ '/assets/images/favicon/favicon-32x32.png' | relative_url }}"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="{{ '/assets/images/favicon/favicon-16x16.png' | relative_url }}"
    />

    <link
      rel="manifest"
      href="{{ '/assets/images/favicon/site.webmanifest' | relative_url }}"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link
      rel="stylesheet"
      href="{{ '/assets/css/custom-style.css' | relative_url }}"
    />

    <link
      rel="stylesheet"
      href="{{ '/assets/css/output.css' | relative_url }}"
    />
  </head>

  <body class="bg-black text-white antialiased">
    {% include /product/site-header.html %}
    <main>{{ content }}</main>
    {% include /product/site-footer.html %}

    <script>
      (function () {
        const header = document.querySelector("[data-site-header]");

        if (!header) return;

        const updateHeaderState = () => {
          header.classList.toggle("is-scrolled", window.scrollY > 0);
        };

        updateHeaderState();
        window.addEventListener("scroll", updateHeaderState, { passive: true });
      })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </body>
</html>
