<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
      {% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}
    </title>

    <meta
      name="description"
      content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
    />

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{{ '/assets/images/favicon/apple-touch-icon.png' | relative_url }}"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{ '/assets/images/favicon/favicon-32x32.png' | relative_url }}"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="{{ '/assets/images/favicon/favicon-16x16.png' | relative_url }}"
    />

    <link
      rel="manifest"
      href="{{ '/assets/images/favicon/site.webmanifest' | relative_url }}"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link
      rel="stylesheet"
      href="{{ '/assets/css/custom-style.css' | relative_url }}"
    />

    <link
      rel="stylesheet"
      href="{{ '/assets/css/output.css' | relative_url }}"
    />
  </head>

  <body class="bg-black text-white antialiased">
    {% include /product/site-header.html %}
    <main>{{ content }}</main>
    {% include /product/site-footer.html %}

    <!-- WhatsApp Floating Button Container -->
    <div class="fixed bottom-0 left-0 right-0 z-50 pointer-events-none">
      <div class="mx-auto w-full max-w-screen-2xl relative">
        <a
          href="https://wa.me/6281330864125"
          target="_blank"
          rel="noopener noreferrer"
          class="absolute bottom-6 right-5 sm:right-6 md:right-8 lg:right-10 flex items-center justify-center w-14 h-14 text-oracle hover:text-white hover:scale-110 transition-all duration-300 pointer-events-auto"
          aria-label="Chat on WhatsApp"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="currentColor"
            viewBox="0 0 16 16"
          >
            <path
              d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"
            />
          </svg>
        </a>
      </div>
    </div>

    <script>
      (function () {
        const header = document.querySelector("[data-site-header]");

        if (!header) return;

        const updateHeaderState = () => {
          header.classList.toggle("is-scrolled", window.scrollY > 0);
        };

        updateHeaderState();
        window.addEventListener("scroll", updateHeaderState, { passive: true });
      })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </body>
</html>
