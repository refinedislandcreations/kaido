<!-- _includes/stats-section.html -->
{% assign stats = include.stats %}

<section class="stats-section relative z-20 w-full shrink-0 border-b border-white/25 bg-black/90 backdrop-blur-sm"
>
  <div class="flex justify-center w-full max-w-screen-2xl mx-auto">
    <div class="mx-auto w-full max-w-7xl px-5 py-6 sm:px-6 md:px-8 md:py-8 lg:px-10">
      <!-- Responsive: 2 columns on mobile, flex row on desktop -->
      <div
        class="stats-container grid grid-cols-2 gap-x-6 gap-y-5 md:flex md:w-full md:justify-between md:gap-6"
      >
        {% for item in stats.items %}
        <div class="stats-item text-left">
          <div
            class="mb-1 font-medium uppercase tracking-[0.1em] text-white/35 text-[10px] md:mb-1.5 md:text-xs"
          >
            {{ item.label }}
          </div>

          <div
            class="font-title font-medium tracking-[-0.02em] text-xs md:text-sm text-white"
          >
            {{ item.value }}
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    // Set initial state for stats items (hidden)
    gsap.set(".stats-item", { opacity: 0, y: 8 });
    gsap.set(".stats-section", { opacity: 0 });

    // Wait for hero animation to complete
    const animateStats = () => {
      // Fade in the section with a smoother transition
      gsap.to(".stats-section", {
        opacity: 1,
        duration: 0.45,
        ease: "power3.out",
      });

      // Animate all stats items at the same time
      gsap.to(".stats-item", {
        opacity: 1,
        y: 0,
        duration: 0.55,
        stagger: 0,
        ease: "power3.out",
        delay: 0,
      });
    };

    // Check if hero animation already completed
    let heroCompleted = false;

    window.addEventListener("heroAnimationComplete", () => {
      heroCompleted = true;
      animateStats();
    });

    // Fallback: animate after 2 seconds
    setTimeout(() => {
      if (!heroCompleted) {
        animateStats();
      }
    }, 2000);
  });
</script>
