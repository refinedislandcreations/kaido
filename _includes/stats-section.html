<!-- _includes/stats-section.html -->
{% assign stats = include.stats %}

<section
  class="relative z-20 border-b border-white/25 bg-black/90 backdrop-blur-sm py-2 md:py-6"
>
  <div class="flex justify-center">
    <div class="w-full max-w-6xl px-4 py-4 md:px-6">
      <!-- Responsive: 2 columns on mobile, flex row on desktop -->
      <div
        class="grid grid-cols-2 gap-x-6 gap-y-5 md:flex md:w-full md:justify-between md:gap-6"
      >
        {% for item in stats.items %}
        <div class="text-left">
          <div
            class="mb-1 font-medium uppercase tracking-[0.1em] text-white/35 text-[10px] md:mb-1.5 md:text-xs"
          >
            {{ item.label }}
          </div>

          <div
            class="font-title font-medium tracking-[-0.02em] text-xs md:text-sm {% if item.label == 'To Place Order' %}text-[#A8C08E]{% else %}text-white{% endif %}"
          >
            {{ item.value }}
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
