<header
  data-site-header
  class="site-header fixed top-0 left-0 z-50 w-full bg-transparent"
>
  <!-- Header Top Bar -->
  <div class="relative z-50 mx-auto w-full max-w-screen-2xl">
    <div
      class="mx-auto flex w-full max-w-7xl items-center justify-between px-5 py-6 sm:px-6 md:px-8 lg:px-10 md:py-8"
    >
      <!-- Left -->
      <a
        href="/homepage.html"
        aria-label="Kaido Home"
        class="flex items-center"
      >
        <img
          src="{{ '/assets/images/logo-2.png' | relative_url }}"
          alt="Kaido Logo"
          class="w-[64px] md:w-[96px]"
        />
      </a>

      <!-- Right -->
      <div class="flex items-center gap-6 md:gap-8">
        <!-- Desktop Navigation -->
        <nav class="hidden md:flex items-center gap-8">
          <a
            href="/phantom.html"
            class="font-body text-sm text-white/70 hover:text-white transition-colors duration-300"
            >Phantom</a
          >
          <a
            href="/oracle.html"
            class="font-body text-sm text-white/70 hover:text-white transition-colors duration-300"
            >Oracle</a
          >
          <a
            href="/homepage.html"
            class="font-body text-sm text-white/70 hover:text-white transition-colors duration-300"
            >Craft</a
          >
          <a
            href="/contact.html"
            class="font-body text-sm text-white/70 hover:text-white transition-colors duration-300"
            >Contact</a
          >
        </nav>

        <!-- Mobile Toggle Button -->
        <button
          id="mobile-menu-btn"
          class="md:hidden text-white p-2 -mr-2 focus:outline-none"
          aria-label="Toggle mobile menu"
        >
          <svg
            class="w-6 h-6 transition-transform duration-300"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              id="icon-menu"
              stroke-linecap="square"
              stroke-linejoin="miter"
              stroke-width="1.5"
              d="M4 6h16M4 12h16M4 18h16"
            />
            <path
              id="icon-close"
              class="hidden"
              stroke-linecap="square"
              stroke-linejoin="miter"
              stroke-width="1.5"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Mobile Menu Overlay -->
<div
  id="mobile-menu-overlay"
  class="fixed inset-0 z-40 bg-[#0A0A0A] flex flex-col items-center justify-center opacity-0 pointer-events-none"
>
  <nav class="flex flex-col items-center w-full px-10 max-w-sm">
    <a
      href="/phantom.html"
      class="mobile-link w-full text-center py-6 border-b border-white/10 font-title text-3xl font-bold uppercase tracking-[-0.02em] text-white/50 hover:text-white transition-colors"
      >PHANTOM</a
    >
    <a
      href="/oracle.html"
      class="mobile-link w-full text-center py-6 border-b border-white/10 font-title text-3xl font-bold uppercase tracking-[-0.02em] text-white/50 hover:text-white transition-colors"
      >ORACLE</a
    >
    <a
      href="/homepage.html"
      class="mobile-link w-full text-center py-6 border-b border-white/10 font-title text-3xl font-bold uppercase tracking-[-0.02em] text-white/50 hover:text-white transition-colors"
      >CRAFT</a
    >
    <a
      href="/contact.html"
      class="mobile-link w-full text-center py-6 font-title text-3xl font-bold uppercase tracking-[-0.02em] text-white/50 hover:text-white transition-colors"
      >CONTACT</a
    >
  </nav>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const btn = document.getElementById("mobile-menu-btn");
    const overlay = document.getElementById("mobile-menu-overlay");
    const iconMenu = document.getElementById("icon-menu");
    const iconClose = document.getElementById("icon-close");
    const mobileLinks = document.querySelectorAll(".mobile-link");
    let isMenuOpen = false;
    let menuTl;

    if (typeof gsap !== "undefined") {
      // Setup GSAP Timeline for menu
      gsap.set(mobileLinks, { y: 20, opacity: 0 });

      menuTl = gsap
        .timeline({ paused: true, reversed: true })
        .to(overlay, { opacity: 1, duration: 0.4, ease: "power2.inOut" })
        .to(
          mobileLinks,
          {
            y: 0,
            opacity: 1,
            duration: 0.4,
            stagger: 0.08,
            ease: "power3.out",
          },
          "-=0.1",
        );
    }

    const toggleMenu = () => {
      isMenuOpen = !isMenuOpen;

      if (isMenuOpen) {
        // Open
        overlay.classList.remove("pointer-events-none");
        overlay.classList.add("pointer-events-auto");
        iconMenu.classList.add("hidden");
        iconClose.classList.remove("hidden");
        document.body.style.overflow = "hidden";

        if (menuTl) {
          menuTl.play();
        } else {
          // Fallback if GSAP fails
          overlay.style.opacity = 1;
          mobileLinks.forEach((l) => {
            l.style.opacity = 1;
            l.style.transform = "none";
          });
        }
      } else {
        // Close
        overlay.classList.remove("pointer-events-auto");
        overlay.classList.add("pointer-events-none");
        iconMenu.classList.remove("hidden");
        iconClose.classList.add("hidden");
        document.body.style.overflow = "";

        if (menuTl) {
          menuTl.reverse();
        } else {
          // Fallback
          overlay.style.opacity = 0;
        }
      }
    };

    if (btn) {
      btn.addEventListener("click", toggleMenu);
    }

    // Close menu when clicking a link
    mobileLinks.forEach((link) => {
      link.addEventListener("click", () => {
        if (isMenuOpen) toggleMenu();
      });
    });
  });
</script>
