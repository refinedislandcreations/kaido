<header data-site-header class="site-header fixed top-0 left-0 z-50 w-full bg-transparent">
  <!-- Header Top Bar -->
  <div class="relative z-50 mx-auto w-full max-w-screen-2xl">
    <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-5 py-6 sm:px-6 md:px-8 lg:px-10 md:py-8">
      <!-- Left -->
      <a href="/" aria-label="Kaido Home" class="flex items-center">
        <img src="{{ '/assets/images/logo-2.png' | relative_url }}" alt="Kaido Logo" class="w-[64px] md:w-[96px]" />
      </a>

      <!-- Right -->
      <div class="flex items-center gap-6 md:gap-8">
        <!-- Desktop Navigation -->
        <nav class="hidden md:flex items-center gap-8">
          <a href="/phantom.html"
            class="font-body text-xs text-white/70 hover:text-white transition-colors duration-300">Phantom</a>
          <a href="/oracle.html"
            class="font-body text-xs text-white/70 hover:text-white transition-colors duration-300">Oracle</a>
          <a href="/homepage.html"
            class="font-body text-xs text-white/70 hover:text-white transition-colors duration-300">Craft</a>
          <a href="/contact.html"
            class="font-body text-xs text-white/70 hover:text-white transition-colors duration-300">Contact</a>
        </nav>

        <!-- Mobile Toggle Button -->
        <button id="mobile-menu-btn" class="md:hidden text-white p-2 -mr-2 focus:outline-none"
          aria-label="Toggle mobile menu">
          <svg class="w-6 h-6 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path id="icon-menu" stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5"
              d="M4 6h16M4 12h16M4 18h16" />
            <path id="icon-close" class="hidden" stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5"
              d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  <div id="mobile-menu-overlay"
    class="fixed inset-0 z-40 bg-[#0A0A0A]/95 backdrop-blur-md flex flex-col items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
    <nav class="flex flex-col items-center gap-10">
      <a href="/phantom.html"
        class="mobile-link font-body text-2xl text-white/80 hover:text-white transition-colors">Phantom</a>
      <a href="/oracle.html"
        class="mobile-link font-body text-2xl text-white/80 hover:text-white transition-colors">Oracle</a>
      <a href="/homepage.html"
        class="mobile-link font-body text-2xl text-white/80 hover:text-white transition-colors">Craft</a>
      <a href="/contact.html"
        class="mobile-link font-body text-2xl text-white/80 hover:text-white transition-colors">Contact</a>
    </nav>
  </div>
</header>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('mobile-menu-btn');
    const overlay = document.getElementById('mobile-menu-overlay');
    const iconMenu = document.getElementById('icon-menu');
    const iconClose = document.getElementById('icon-close');
    const mobileLinks = document.querySelectorAll('.mobile-link');
    let isMenuOpen = false;

    const toggleMenu = () => {
      isMenuOpen = !isMenuOpen;
      if (isMenuOpen) {
        overlay.classList.remove('opacity-0', 'pointer-events-none');
        overlay.classList.add('opacity-100', 'pointer-events-auto');
        iconMenu.classList.add('hidden');
        iconClose.classList.remove('hidden');
        document.body.style.overflow = 'hidden'; // Prevent body scrolling
      } else {
        overlay.classList.remove('opacity-100', 'pointer-events-auto');
        overlay.classList.add('opacity-0', 'pointer-events-none');
        iconMenu.classList.remove('hidden');
        iconClose.classList.add('hidden');
        document.body.style.overflow = ''; // Restore body scrolling
      }
    };

    if (btn) {
      btn.addEventListener('click', toggleMenu);
    }

    // Close menu when clicking a link
    mobileLinks.forEach(link => {
      link.addEventListener('click', () => {
        if (isMenuOpen) toggleMenu();
      });
    });
  });
</script>
