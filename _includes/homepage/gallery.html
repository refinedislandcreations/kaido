<!-- _includes/homepage/gallery.html -->
{% assign section = include.section %}
<section class="section w-full bg-[#0A0A0A]">
  <div class="mx-auto w-full max-w-screen-2xl relative">
    <div class="grid grid-cols-2 w-full gap-0 md:gap-1">
      {% for img in section.images %}
      <div class="aspect-square relative overflow-hidden group">
        <img src="{{ img }}" alt="Kaido Lifestyle Gallery Image" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy">
      </div>
      {% endfor %}
    </div>
  </div>
</section>
