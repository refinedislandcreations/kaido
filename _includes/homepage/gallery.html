<!-- _includes/homepage/gallery.html -->
{% assign section = include.section %}
<section class="relative bg-[#0A0A0A] text-white overflow-hidden">
  <div class="relative z-10 flex items-center">
    <div class="mx-auto w-full max-w-screen-2xl">
      <div class="mx-auto w-full max-w-7xl px-5 py-16 md:py-24 sm:px-6 md:px-8 lg:px-10">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
          {% for img in section.images %}
          <div class="aspect-square relative overflow-hidden group">
            <img src="{{ img }}" alt="Gallery Image" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</section>
