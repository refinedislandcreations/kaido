<!-- _includes/homepage/cta-hero.html -->
{% assign section = include.section %}
<section class="relative min-h-[50vh] md:min-h-[70vh] flex items-center bg-black text-white overflow-hidden">
  <!-- Background Layer -->
  <div class="absolute inset-0 flex justify-center">
    <div class="mx-auto w-full max-w-screen-2xl h-full overflow-hidden relative">
      <img src="{{ section.background_image }}" alt="{{ section.title | strip_html }}" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-black/60"></div>
    </div>
  </div>
  
  <!-- Content Layer -->
  <div class="relative z-10 flex items-center w-full">
    <div class="mx-auto w-full max-w-screen-2xl">
      <div class="mx-auto w-full max-w-7xl px-5 py-24 sm:px-6 md:px-8 lg:px-10">
        <div class="max-w-2xl lg:max-w-3xl">
          <h2 class="font-title font-bold text-[3rem] md:text-[4.5rem] lg:text-[5.5rem] leading-[0.95] tracking-[-0.04em] uppercase mb-6 text-white">
            {{ section.title }}
          </h2>
          
          {% if section.description %}
          <p class="text-lg md:text-xl text-white/80 leading-[1.6] mb-8">{{ section.description }}</p>
          {% endif %}
          
          {% if section.button_text %}
          <a href="{{ section.button_url }}" class="inline-flex items-center gap-3 border border-white/60 px-8 py-4 font-title text-[10px] uppercase tracking-[0.2em] hover:bg-white hover:text-black transition-colors focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-black">
            <span>{{ section.button_text }}</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-2 w-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="square" stroke-linejoin="miter" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
          </a>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</section>
