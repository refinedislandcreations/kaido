<!-- _includes/contact/contact-form.html -->
{% assign section = include.section %}
<section class="w-full bg-[#0A0A0A] py-20 md:py-32">
  <div class="mx-auto w-full max-w-7xl px-5 sm:px-6 md:px-8 lg:px-10">
    <div class="flex flex-col lg:flex-row gap-16 lg:gap-32">
      <!-- Left side title -->
      <div class="w-full lg:w-1/3">
        <div class="flex items-center gap-2 mb-6">
           <span class="font-title text-[10px] uppercase tracking-[0.25em] text-white/40">{{ section.eyebrow }}</span>
           <div class="h-px w-12 bg-white/10"></div>
        </div>
        <h2 class="font-title font-bold text-5xl md:text-6xl text-white tracking-[-0.02em] leading-[1.1]">{{ section.title }}</h2>
      </div>

      <!-- Right side form -->
      <div class="w-full lg:w-2/3">
        <form class="flex flex-col gap-10">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
            <div class="flex flex-col gap-2">
              <label class="font-title text-[10px] uppercase tracking-[0.2em] text-white/60">FIRST NAME</label>
              <input type="text" placeholder="First Name" class="bg-transparent border-b border-white/20 pb-3 text-white focus:outline-none focus:border-[#8C9A81] transition-colors placeholder:text-white/20" required>
            </div>
            <div class="flex flex-col gap-2">
              <label class="font-title text-[10px] uppercase tracking-[0.2em] text-white/60">LAST NAME</label>
              <input type="text" placeholder="Last Name" class="bg-transparent border-b border-white/20 pb-3 text-white focus:outline-none focus:border-[#8C9A81] transition-colors placeholder:text-white/20" required>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
            <div class="flex flex-col gap-2">
              <label class="font-title text-[10px] uppercase tracking-[0.2em] text-white/60">EMAIL</label>
              <input type="email" placeholder="Your@Email.Com" class="bg-transparent border-b border-white/20 pb-3 text-white focus:outline-none focus:border-[#8C9A81] transition-colors placeholder:text-white/20" required>
            </div>
            <div class="flex flex-col gap-2">
              <label class="font-title text-[10px] uppercase tracking-[0.2em] text-white/60">PHONE / WHATSAPP</label>
              <input type="text" placeholder="+62 Xxxx Xxxx" class="bg-transparent border-b border-white/20 pb-3 text-white focus:outline-none focus:border-[#8C9A81] transition-colors placeholder:text-white/20" required>
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <label class="font-title text-[10px] uppercase tracking-[0.2em] text-white/60">LOCATION</label>
            <select class="bg-transparent border-b border-white/20 pb-3 text-white focus:outline-none focus:border-[#8C9A81] transition-colors appearance-none" required>
              <option value="" class="bg-[#0A0A0A]">Select</option>
              <option value="bali" class="bg-[#0A0A0A]">Bali, Indonesia</option>
              <option value="other" class="bg-[#0A0A0A]">Other</option>
            </select>
          </div>

          <div class="flex flex-col gap-6">
            <label class="font-title text-[10px] uppercase tracking-[0.2em] text-white/60">INSTRUMENT OF INTEREST</label>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <!-- Cards -->
              <label class="cursor-pointer border border-[#8C9A81] p-6 hover:bg-[#111111] transition-colors flex flex-col items-center text-center">
                <input type="radio" name="instrument" class="hidden" value="phantom" checked>
                <span class="font-title font-bold text-lg text-white mb-1">PHANTOM</span>
                <span class="font-title text-[9px] uppercase tracking-[0.1em] text-white/50">CHARCOAL BLACK &middot; AVAILABLE</span>
              </label>
              <label class="cursor-pointer border border-white/20 p-6 hover:bg-[#111111] hover:border-white/40 transition-colors flex flex-col items-center text-center">
                <input type="radio" name="instrument" class="hidden" value="oracle">
                <span class="font-title font-bold text-lg text-white mb-1">ORACLE</span>
                <span class="font-title text-[9px] uppercase tracking-[0.1em] text-white/50">IVORY & SAGE &middot; RESERVE</span>
              </label>
              <label class="cursor-pointer border border-white/20 p-6 hover:bg-[#111111] hover:border-white/40 transition-colors flex flex-col items-center text-center">
                <input type="radio" name="instrument" class="hidden" value="both">
                <span class="font-title font-bold text-lg text-white mb-1">BOTH</span>
                <span class="font-title text-[9px] uppercase tracking-[0.1em] text-white/50">DISCUSS THE COLLECTION</span>
              </label>
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <label class="font-title text-[10px] uppercase tracking-[0.2em] text-white/60">INTENDED USE</label>
            <select class="bg-transparent border-b border-white/20 pb-3 text-white focus:outline-none focus:border-[#8C9A81] transition-colors appearance-none" required>
              <option value="" class="bg-[#0A0A0A]">Select</option>
              <option value="personal" class="bg-[#0A0A0A]">Personal / Home</option>
              <option value="commercial" class="bg-[#0A0A0A]">Commercial / Studio</option>
            </select>
          </div>

          <button type="submit" class="w-full border border-white/40 py-5 mt-4 font-title text-[10px] uppercase tracking-[0.2em] text-white hover:bg-white hover:text-black transition-colors focus:ring-2 focus:ring-white flex items-center justify-center gap-3">
            <span>SUBMIT ENQUIRY</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="square" stroke-linejoin="miter" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
