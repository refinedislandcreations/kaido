<!-- _includes/hero-section.html -->
{% assign section = include.section %}

<section
  class="relative min-h-[40dvh] md:min-h-[85dvh] overflow-hidden bg-black text-white"
>
  <!-- Background -->
  <div class="absolute inset-0">
    <img
      src="{{ section.background_image }}"
      alt="Hero background - {{ section.title }}"
      role="presentation"
      class="h-full w-full object-cover"
    />

    <div class="absolute inset-0 bg-black/45"></div>
  </div>

  <div class="relative z-10 flex min-h-[40dvh] md:min-h-[85dvh] items-center">
    <!-- Fixed max-width to prevent excessive width on large screens -->
    <div
      class="mx-auto w-full max-w-7xl px-5 pt-32 pb-24 sm:px-6 md:px-8 lg:px-10"
    >
      <div class="max-w-2xl lg:max-w-3xl">
        <!-- Eyebrow -->
        <div
          class="hero-eyebrow mb-3 flex items-center gap-2 sm:mb-4 sm:gap-3 md:mb-6 md:gap-4"
        >
          <span
            class="font-title text-[9px] uppercase tracking-[0.25em] text-[#A8CD97] sm:text-[10px] md:text-[11px]"
          >
            {{ section.eyebrow }}
          </span>

          <div class="h-px w-10 bg-[#A8CD97]/40 sm:w-12 md:w-16"></div>
        </div>

        <!-- Title -->
        <h1
          class="hero-title font-title text-[3rem] font-bold leading-[0.9] tracking-[-0.06em] md:text-[6rem]"
        >
          {{ section.title }}
        </h1>

        <!-- Subtitle -->
        <div
          class="hero-subtitle mt-4 text-lg font-bold uppercase leading-tight sm:mt-5 md:mt-6 md:text-2xl"
        >
          {{ section.subtitle }}
        </div>

        <!-- Description -->
        <div
          class="hero-description mt-6 text-sm leading-[1.7] text-white/80 sm:mt-8 md:text-base md:mt-10 max-w-xl"
        >
          {% for item in section.description %}
          <p>{{ item }}</p>
          {% endfor %}
        </div>

        <!-- Button -->
        <div class="hero-button mt-8 sm:mt-10 md:mt-12">
          <!-- Button -->
          <div class="mt-8 sm:mt-10 md:mt-12">
            <a
              href="{{ section.button_url }}"
              class="group inline-flex items-center justify-center gap-3 border border-white/80 bg-transparent px-10 py-4 font-title text-[11px] font-semibold uppercase tracking-[0.25em] text-white transition-all duration-300 hover:border-white hover:bg-white hover:text-[#0A0A0A] focus:outline-none focus:ring-2 focus:ring-[#A8CD97] focus:ring-offset-2 focus:ring-offset-black md:text-xs cursor-pointer"
              aria-label="{{ section.button_text }} - {{ section.title }}"
            >
              <span>{{ section.button_text }}</span>

              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-2 w-2 transition-transform duration-300 group-hover:translate-x-1"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="square"
                  stroke-linejoin="miter"
                  d="M14 5l7 7m0 0l-7 7m7-7H3"
                />
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    // Set initial states (hidden) - slightly subtler translate
    gsap.set(".hero-eyebrow", { opacity: 0, y: 10 });
    gsap.set(".hero-title", { opacity: 0, y: 10 });
    gsap.set(".hero-subtitle", { opacity: 0, y: 10 });
    gsap.set(".hero-description", { opacity: 0, y: 10 });
    gsap.set(".hero-button", { opacity: 0, y: 10 });

    // Create timeline with softer easing, longer durations and gentle overlaps
    const heroTl = gsap.timeline({
      defaults: {
        duration: 0.55,
        ease: "power3.out",
      },
      onComplete: () => {
        window.dispatchEvent(new CustomEvent("heroAnimationComplete"));
      },
    });

    heroTl
      .to(".hero-eyebrow", { opacity: 1, y: 0, duration: 0.45 })
      .to(".hero-title", { opacity: 1, y: 0 }, "-=0.35")
      .to(".hero-subtitle", { opacity: 1, y: 0 }, "-=0.32")
      .to(".hero-description", { opacity: 1, y: 0 }, "-=0.28")
      .to(".hero-button", { opacity: 1, y: 0 }, "-=0.25");
  });
</script>
