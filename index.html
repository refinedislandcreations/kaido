---
layout: coming-soon
title: Coming Soon | Kaido
---

<section
  class="relative flex min-h-screen min-h-[100dvh] flex-col items-center justify-center overflow-hidden bg-black text-white"
>
  <div class="absolute inset-0 z-0">
    <img
      src="{{ '/assets/images/phantom-hero.png' | relative_url }}"
      alt=""
      role="presentation"
      fetchpriority="high"
      class="h-full w-full object-cover object-center"
    />
    <div
      class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/80"
    ></div>
  </div>

  <div class="absolute left-6 top-6 z-20 md:left-10 md:top-10">
    <img
      src="{{ '/assets/images/logo-2.png' | relative_url }}"
      alt="Kaido"
      class="h-[calc(var(--spacing)*10)] w-auto"
    />
  </div>

  <div
    class="relative z-10 flex w-full max-w-5xl flex-col items-center px-5 text-center -mt-18 sm:-mt-20 md:-mt-32"
  >
    <div class="mb-6 flex w-full items-center justify-center gap-4 md:gap-6">
      <div class="h-px w-12 bg-white/40 md:w-24"></div>
      <span
        class="font-title text-[10px] font-medium uppercase tracking-[0.32em] text-white/90 md:text-[12px]"
      >
        New Experience in Progress
      </span>
      <div class="h-px w-12 bg-white/40 md:w-24"></div>
    </div>

    <h1
      class="mb-10 font-title text-[3rem] font-medium leading-none tracking-tight text-white sm:text-[4rem] md:text-[5.5rem]"
    >
      Arriving 2026.
    </h1>

    <a
      href="#join"
      class="group relative top-8 md:top-12 inline-flex items-center justify-center gap-3 border border-white/80 bg-transparent px-10 py-4 font-title text-[11px] font-semibold uppercase tracking-[0.25em] text-white transition-all duration-300 hover:border-white hover:bg-white hover:text-[#0A0A0A] focus:outline-none focus:ring-2 focus:ring-[#A8CD97] focus:ring-offset-2 focus:ring-offset-black md:text-xs"
    >
      <span>Join the Waitlist</span>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-2 w-2 transition-transform duration-300 group-hover:translate-x-1"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="square"
          stroke-linejoin="miter"
          d="M14 5l7 7m0 0l-7 7m7-7H3"
        />
      </svg>
    </a>
  </div>

  <div
    class="absolute bottom-24 left-1/2 z-10 w-full -translate-x-1/2 px-5 text-center md:bottom-32"
  >
    <p
      class="font-body text-[12px] italic tracking-[0.25em] text-white/80 md:text-sm md:tracking-[0.3em]"
    >
      A permanent standard in recovery.
    </p>
  </div>

  <div class="absolute bottom-6 left-6 z-10 md:bottom-10 md:left-10">
    <a
      href="mailto:info@kaido.recovery"
      aria-label="Email Kaido"
      class="font-body text-[10px] tracking-[0.15em] text-white/70 transition-colors hover:text-white focus:text-white focus:outline-none md:text-xs"
    >
      info@kaido.recovery
    </a>
  </div>

  <div class="absolute bottom-6 right-6 z-10 md:bottom-10 md:right-10">
    <a
      href="https://instagram.com/kaido.recovery"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Kaido on Instagram"
      class="font-body text-[10px] tracking-[0.15em] text-white/70 transition-colors hover:text-white focus:text-white focus:outline-none md:text-xs"
    >
      @kaido.recovery
    </a>
  </div>
</section>
